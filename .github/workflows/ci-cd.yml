name: CI/CD Todo App

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  BACKEND_IMAGE: ${{ secrets.DOCKER_USERNAME }}/todo-backend
  FRONTEND_IMAGE: ${{ secrets.DOCKER_USERNAME }}/todo-frontend

jobs:
  lint-and-syntax-check:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: todo_user
          POSTGRES_PASSWORD: todo_pass
          POSTGRES_DB: todo_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: todo-app/backend/package-lock.json

      - name: Install backend dependencies
        run: cd todo-app/backend && npm ci

      - name: Syntax check server.js
        run: cd todo-app/backend && node --check server.js

      - name: Run backend tests if present
        working-directory: todo-app/backend
        env:
          DB_HOST: localhost
          DB_PORT: 5432
          DB_USER: todo_user
          DB_PASSWORD: todo_pass
          DB_NAME: todo_db
        run: |
          if npm run | grep -q " test"; then
            npm test
          else
            echo "No test script found, skipping."
          fi

  build-and-integration-test:
    runs-on: ubuntu-latest
    needs: lint-and-syntax-check
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: todo_user
          POSTGRES_PASSWORD: todo_pass
          POSTGRES_DB: todo_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image
        run: docker build -t ${{ env.BACKEND_IMAGE }}:test ./todo-app/backend

      - name: Build frontend image
        run: docker build -t ${{ env.FRONTEND_IMAGE }}:test ./todo-app/frontend

      - name: Create Docker network
        run: docker network create todo-net

      - name: Run backend container
        run: |
          docker run -d \
            --name todo-backend \
            --network todo-net \
            -p 3000:3000 \
            -e DB_HOST=host.docker.internal \
            -e DB_PORT=5432 \
            -e DB_USER=todo_user \
            -e DB_PASSWORD=todo_pass \
            -e DB_NAME=todo_db \
            -e PORT=3000 \
            --add-host=host.docker.internal:host-gateway \
            ${{ env.BACKEND_IMAGE }}:test

      - name: Run frontend container
        run: |
          docker run -d \
            --name todo-frontend \
            --network todo-net \
            -p 80:80 \
            ${{ env.FRONTEND_IMAGE }}:test

      - name: Wait for backend health
        run: |
          set -e
          echo "Waiting for backend..."
          for i in $(seq 1 30); do
            if curl -sf http://localhost:3000/health; then
              echo "Backend is up!"
              exit 0
            fi
            echo "Attempt $i/30 failed, retrying in 3s..."
            sleep 3
          done
          echo "Backend never became healthy"
          docker logs todo-backend
          exit 1

      - name: Step A - Health check
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:3000/health)
          [ "$STATUS" = "200" ] || (echo "FAIL: /health returned $STATUS" && exit 1)
          echo "PASS: /health -> 200"

      - name: Step B - GET todos (empty list)
        run: |
          RESPONSE=$(curl -sf http://localhost:3000/api/todos)
          echo "GET /api/todos: $RESPONSE"
          echo "$RESPONSE" | grep -E '^\[' || (echo "FAIL: not a JSON array" && exit 1)
          echo "PASS: GET /api/todos -> JSON array"

      - name: Step C - POST new todo
        run: |
          RESPONSE=$(curl -sf -X POST http://localhost:3000/api/todos \
            -H "Content-Type: application/json" \
            -d '{"text":"CI Integration Test Task"}')
          echo "POST /api/todos: $RESPONSE"
          echo "$RESPONSE" | grep -i "CI Integration Test Task" || \
            (echo "FAIL: todo text not in response" && exit 1)
          TODO_ID=$(echo "$RESPONSE" | grep -o '"id":[0-9]*' | grep -o '[0-9]*')
          echo "TODO_ID=$TODO_ID" >> $GITHUB_ENV
          echo "PASS: POST /api/todos -> created id=$TODO_ID"

      - name: Step D - GET todos (contains new item)
        run: |
          RESPONSE=$(curl -sf http://localhost:3000/api/todos)
          echo "$RESPONSE" | grep -i "CI Integration Test Task" || \
            (echo "FAIL: new todo not in list" && exit 1)
          echo "PASS: new todo visible in GET /api/todos"

      - name: Step E - PUT (update) todo
        run: |
          RESPONSE=$(curl -sf -X PUT http://localhost:3000/api/todos/$TODO_ID \
            -H "Content-Type: application/json" \
            -d '{"completed":true}')
          echo "PUT /api/todos/$TODO_ID: $RESPONSE"
          echo "$RESPONSE" | grep '"completed":true' || \
            (echo "FAIL: completed flag not updated" && exit 1)
          echo "PASS: PUT /api/todos/$TODO_ID -> completed=true"

      - name: Step F - DELETE todo
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" -X DELETE \
            http://localhost:3000/api/todos/$TODO_ID)
          [ "$STATUS" = "200" ] || (echo "FAIL: DELETE returned $STATUS" && exit 1)
          echo "PASS: DELETE /api/todos/$TODO_ID -> 200"

      - name: Step G - Frontend responds
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:80)
          [ "$STATUS" = "200" ] || (echo "FAIL: frontend returned $STATUS" && exit 1)
          echo "PASS: frontend -> 200"

      - name: Print container logs on failure
        if: failure()
        run: |
          echo "=== BACKEND LOGS ==="
          docker logs todo-backend || true
          echo "=== FRONTEND LOGS ==="
          docker logs todo-frontend || true

      - name: Cleanup
        if: always()
        run: |
          docker stop todo-backend todo-frontend || true
          docker rm todo-backend todo-frontend || true
          docker network rm todo-net || true
          docker rmi ${{ env.BACKEND_IMAGE }}:test ${{ env.FRONTEND_IMAGE }}:test || true

  push-to-dockerhub:
    runs-on: ubuntu-latest
    needs: build-and-integration-test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Docker metadata for backend
        id: meta-backend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.BACKEND_IMAGE }}
          tags: |
            type=sha,prefix=sha-,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push backend
        uses: docker/build-push-action@v6
        with:
          context: ./todo-app/backend
          push: true
          tags: ${{ steps.meta-backend.outputs.tags }}
          labels: ${{ steps.meta-backend.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Docker metadata for frontend
        id: meta-frontend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.FRONTEND_IMAGE }}
          tags: |
            type=sha,prefix=sha-,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push frontend
        uses: docker/build-push-action@v6
        with:
          context: ./todo-app/frontend
          push: true
          tags: ${{ steps.meta-frontend.outputs.tags }}
          labels: ${{ steps.meta-frontend.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Summary
        run: |
          echo "### Docker Images Pushed 🚀" >> $GITHUB_STEP_SUMMARY
          echo "- Backend: ${{ env.BACKEND_IMAGE }}:latest" >> $GITHUB_STEP_SUMMARY
          echo "- Frontend: ${{ env.FRONTEND_IMAGE }}:latest" >> $GITHUB_STEP_SUMMARY
          echo "- Commit SHA tag: sha-$(git rev-parse --short HEAD)" >> $GITHUB_STEP_SUMMARY
